name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        run: mvn -B verify

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are configured
        run: |
          if [ -z "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret DIGITALOCEAN_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DO_PROJECT_ID }}" ]; then
            echo "::error::Missing GitHub secret DO_PROJECT_ID"
            echo "Create a DO project, then add its ID (e.g. pragesh-batch-inference project)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        env:
          DO_PROJECT_ID: ${{ secrets.DO_PROJECT_ID }}
        run: |
          doctl apps create \
            --spec .do/app.yaml \
            --project-id "$DO_PROJECT_ID" \
            --upsert \
            --wait
