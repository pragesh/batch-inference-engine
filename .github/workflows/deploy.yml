name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        run: mvn -B verify

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Verify DigitalOcean token is configured
        run: |
          if [ -z "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing GitHub secret DIGITALOCEAN_ACCESS_TOKEN"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Validate app spec
        run: doctl apps spec validate .do/app.yaml

      - name: Deploy to App Platform
        env:
          DO_PROJECT_ID: ${{ secrets.DO_PROJECT_ID }}
        run: |
          APP_ID=$(doctl apps list -o json | python3 -c "
          import json, sys
          apps = json.load(sys.stdin)
          for app in apps:
              if app.get('spec', {}).get('name') == 'batch-inference-engine':
                  print(app['id'])
                  break
          ")

          if [ -n "$APP_ID" ]; then
            echo "Updating existing app: $APP_ID"
            doctl apps update "$APP_ID" --spec .do/app.yaml --wait
          else
            if [ -z "$DO_PROJECT_ID" ]; then
              echo "::error::New app requires DO_PROJECT_ID secret"
              exit 1
            fi
            echo "Creating new app in project: $DO_PROJECT_ID"
            doctl apps create --spec .do/app.yaml --project-id "$DO_PROJECT_ID" --wait
          fi

      - name: Print app URL
        run: |
          APP_ID=$(doctl apps list -o json | python3 -c "
          import json, sys
          for app in json.load(sys.stdin):
              if app.get('spec', {}).get('name') == 'batch-inference-engine':
                  print(app['id']); break
          ")
          doctl apps get "$APP_ID" --format DefaultIngress
